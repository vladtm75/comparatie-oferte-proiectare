function Dashboard() {
  const [tabId, setTabId] = useState("dra");
  const [cur, setCur] = useState("both");
  const tab = TABS.find((t) => t.id === tabId);
  const T = tab.theme;

  const money = (ron, eur) => {
    const e = eur != null ? eur : ron / RATE;
    if (cur === "ron") return ronF(ron);
    if (cur === "eur") return eurF(e);
    return `${ronF(ron)} · ${eurF(e)}`;
  };

  return (
    <div style={{ fontFamily: T.font, background: T.cream, color: "#1f1b29", minHeight: "100vh", transition: "background .25s" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&family=Playfair+Display:wght@700;900&family=Red+Hat+Text:wght@300;400;500;700&family=Red+Hat+Display:wght@900&display=swap');

        table { border-collapse: collapse; width: 100%; }
        .row-hover:hover { background: rgba(0,0,0,.025); }

          </div>
          <div style={{ display: "flex", gap: 5, background: "rgba(255,255,255,.14)", padding: 4, borderRadius: 9 }}>
            {[["both", "RON + €"], ["ron", "RON"], ["eur", "€"]].map(([k, lbl]) => (
              <button key={k} onClick={() => setCur(k)}
                style={{ border: "none", cursor: "pointer", padding: "6px 12px", borderRadius: 6, fontSize: 12, fontWeight: 700,
                  fontFamily: "inherit", background: cur === k ? "#fff" : "transparent", color: cur === k ? T.primary : "#fff" }}>
                {lbl}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", maxWidth: 1180, margin: "12px auto 0" }}>

            <button key={t.id} onClick={() => setTabId(t.id)}

      </div>

      <div style={{ padding: "24px 30px 44px", maxWidth: 1180, margin: "0 auto" }}>

/* ===================== shared UI ========================================== */
function Mark({ T }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 44, minWidth: 44,
      padding: "0 12px", background: "rgba(255,255,255,.16)", borderRadius: 9, fontWeight: 800, fontSize: 16, color: "#fff" }}>
      {T.short}
    </div>
  );
}
function Pill({ children, bg, color }) {
  return <span style={{ background: bg, color: color || "#fff", fontSize: 11, fontWeight: 700,
    padding: "3px 9px", borderRadius: 20, whiteSpace: "nowrap" }}>{children}</span>;
}
function Card({ children, style, T }) {
  return <div style={{ background: "#fff", border: `1px solid ${T ? T.soft : "#e7e1ee"}`, borderRadius: 14, padding: 18, ...style }}>{children}</div>;
}
function Title({ children, sub, T }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ color: T.primary, fontWeight: 800, fontSize: 18 }}>{children}</div>
      {sub && <div style={{ color: "#6c6577", fontSize: 13, marginTop: 2 }}>{sub}</div>}
    </div>
  );
}
function KPI({ label, value, sub, T, big }) {
  return (
    <Card T={T} style={{ flex: 1, minWidth: 180 }}>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: .5, color: "#8a8397", textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontSize: big ? 26 : 22, fontWeight: 800, color: T.primary, marginTop: 6, lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: "#6c6577", marginTop: 4 }}>{sub}</div>}
    </Card>
  );
}

/* ===================== TAB: SUMAR & RECOMANDARE =========================== */
function Sumar({ T, money }) {

          "11+ ani · ISO 9001/14001/27001/45001", "Autorizații in-house: incendiu, efracție, electrice, gaze",

        <FirmMini T={T} color="#C9A227" name="EnsoDesign" tag="Candidat #2 realist" lines={[
          "Preț ~1,3× A Studio (≈ 24.553 € pe Dr.A) — în prag acceptabil", "Ofertă în EUR · scope similar pe faze",

      <Card T={T} style={{ marginBottom: 18, borderTop: `4px solid ${T.accent}` }}>
        <Title T={T} sub="Singurul furnizor cu grafic clar — devine standardul de aliniere pentru ceilalți">Benchmark · condiții de plată</Title>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
          {[{ l: "Avans (la semnare)", v: "50%", hot: true }, { l: "La predare PT", v: "25%", hot: false },
            { l: "La autorizația de construire", v: "20%", hot: true }, { l: "La recepție", v: "5%", hot: false }].map((p, i) => (
            <div key={i} style={{ flex: "1 1 150px", minWidth: 140, padding: "12px 14px", borderRadius: 10,
              background: p.hot ? T.soft : "#f6f5f8", border: `1px solid ${p.hot ? T.accent : "#e7e1ee"}` }}>

            </div>

          avansul de 50% și tranșa de 20% la obținerea autorizației de construire.

          Pe <b>condiții de plată</b>, adoptarea graficului A Studio: 50% avans · 25% la predare PT · 20% la autorizația de construire · 5% la recepție

          Îl păstrăm pe lista scurtă doar pentru proiecte excepționale (monument complex / turnkey cu un singur responsabil),

          <b style={{ color: T.primary }}>Țintă de negociere EnsoDesign vs A Studio (Dr.A, fără TVA):</b><br />

          (4) cere EnsoDesign și o ofertă pentru Medima pe același brief.
        </div>
      </Card>
    </div>

function FirmMini({ T, color, name, tag, lines }) {
  return (
    <Card T={T} style={{ borderTop: `4px solid ${color}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>

        <Pill bg={color}>{tag}</Pill>
      </div>
      {lines.map((l, i) => (
        <div key={i} style={{ fontSize: 12.5, color: "#46414f", display: "flex", gap: 7, marginTop: 5 }}>
          <span style={{ color }}>▪</span><span>{l}</span>
        </div>
      ))}
    </Card>
  );
}
function Reco({ n, title, children, T }) {

        <div style={{ fontWeight: 700, color: "#2b2735", fontSize: 14.5 }}>{title}</div>

    .reduce((sum, [, val]) => sum + (typeof val === 'number' ? val : 0), 0);
  
  return {
    ...offer,

                    <XAxis dataKey="name" tick={{ fill: '#64748b', fontSize: 10 }} angle={-45} textAnchor="end" height={70} />
                    <YAxis tick={{ fill: '#64748b', fontSize: 12 }} domain={[0, 20]} />
                    <Tooltip formatter={(value) => [`€${value}/mp`]} contentStyle={{ borderRadius: '8px', border: `1px solid ${DA_COLORS.wheat}` }} />
                    <Legend />
                    <Bar dataKey="DTAC" fill={DA_COLORS.primary} radius={[4, 4, 0, 0]} />
                    <Bar dataKey="PTH" fill={DA_COLORS.amberGold} radius={[4, 4, 0, 0]} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>
        )}

        {activeTab === 'curtea' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '32px' }}>
            {/* Hero Card */}
            <div style={{ background: `linear-gradient(135deg, ${DA_COLORS.primary} 0%, #5a1510 100%)`, borderRadius: '16px', padding: '32px', color: DA_COLORS.white, borderBottom: `4px solid ${DA_COLORS.amberGold}` }}>
              <p style={{ color: DA_COLORS.amberGold, fontSize: '12px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '1px' }}>Ofertă în validare</p>
              <h2 style={{ fontSize: '32px', fontWeight: 700, marginTop: '8px', fontFamily: "'Playfair Display', serif" }}>Clinica Curtea de Argeș</h2>
              <p style={{ color: DA_COLORS.wheat, marginTop: '4px' }}>{curteaDeArges?.address}</p>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '16px', marginTop: '24px' }}>
                {[
                  { label: 'Suprafață', value: `${curteaDeArges?.area} mp` },
                  { label: 'Total Final', value: formatCurrency(curteaDeArges?.totalAfterDiscount || 0) },
                  { label: 'Preț/mp', value: `€${curteaDeArges?.pricePerSqm}` }
                ].map((item, i) => (
                  <div key={i} style={{ backgroundColor: 'rgba(255,255,255,0.15)', borderRadius: '12px', padding: '16px' }}>
                    <p style={{ color: DA_COLORS.wheat, fontSize: '12px' }}>{item.label}</p>
                    <p style={{ fontSize: '28px', fontWeight: 700 }}>{item.value}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Info Cards */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '24px' }}>
              <div style={{ backgroundColor: DA_COLORS.yellow + '40', border: `1px solid ${DA_COLORS.amberGold}`, borderRadius: '12px', padding: '24px' }}>
                <h3 style={{ fontWeight: 600, color: DA_COLORS.text, margin: '0 0 12px 0' }}>⚠️ Tarife Mai Mari</h3>
                <p style={{ fontSize: '14px', margin: '8px 0' }}>DTAC: <strong>€13/mp</strong> (std: €12)</p>
                <p style={{ fontSize: '14px', margin: '8px 0' }}>PTH: <strong>€16/mp</strong> (std: €15)</p>
                <p style={{ fontSize: '13px', color: '#666', marginTop: '12px', paddingTop: '12px', borderTop: `1px solid ${DA_COLORS.amberGold}` }}>Extra cost: <strong>+€866</strong></p>
              </div>
              <div style={{ backgroundColor: DA_COLORS.olive + '20', border: `1px solid ${DA_COLORS.olive}`, borderRadius: '12px', padding: '24px' }}>
                <h3 style={{ fontWeight: 600, color: DA_COLORS.text, margin: '0 0 12px 0' }}>🏗️ Servicii Extra</h3>
                <p style={{ fontSize: '14px', margin: '6px 0' }}>Expertiză desființare C2: €2,125</p>
                <p style={{ fontSize: '14px', margin: '6px 0' }}>SRE + NZEB: €3,750</p>
                <p style={{ fontSize: '14px', margin: '6px 0' }}>Scenariu incendiu: €1,250</p>
                <p style={{ fontSize: '13px', color: '#666', marginTop: '12px', paddingTop: '12px', borderTop: `1px solid ${DA_COLORS.olive}` }}>Total extra: <strong>€7,125</strong></p>
              </div>
              <div style={{ backgroundColor: DA_COLORS.white, border: `1px solid ${DA_COLORS.wheat}`, borderRadius: '12px', padding: '24px' }}>
                <h3 style={{ fontWeight: 600, color: DA_COLORS.primary, margin: '0 0 12px 0' }}>📊 Evaluare</h3>
                <div style={{ padding: '12px', borderRadius: '8px', backgroundColor: curteaVsAvg > 15 ? DA_COLORS.yellow + '30' : DA_COLORS.olive + '20', border: `1px solid ${curteaVsAvg > 15 ? DA_COLORS.amberGold : DA_COLORS.olive}` }}>
                  <p style={{ fontSize: '14px', fontWeight: 600, margin: 0 }}>€{curteaDeArges?.pricePerSqm}/mp</p>
                  <p style={{ fontSize: '12px', color: '#666', marginTop: '4px' }}>{curteaVsAvg > 0 ? '+' : ''}{curteaVsAvg.toFixed(1)}% vs. media</p>
                </div>
                <p style={{ fontSize: '12px', color: '#666', marginTop: '12px' }}>Justificat prin servicii suplimentare</p>
              </div>
            </div>

            {/* Comparison Table */}
            <div style={{ backgroundColor: DA_COLORS.white, borderRadius: '12px', border: `1px solid ${DA_COLORS.wheat}`, padding: '24px' }}>
              <h3 style={{ fontSize: '18px', fontWeight: 600, color: DA_COLORS.primary, marginBottom: '16px' }}>Curtea de Argeș vs. Câmpina</h3>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ fontSize: '11px', fontWeight: 600, textTransform: 'uppercase' }}>
                    <th style={{ padding: '12px 16px', textAlign: 'left', backgroundColor: DA_COLORS.wheat + '50' }}>Metric</th>
                    <th style={{ padding: '12px 16px', textAlign: 'right', backgroundColor: DA_COLORS.primary + '10', color: DA_COLORS.primary }}>Curtea de Argeș</th>
                    <th style={{ padding: '12px 16px', textAlign: 'right', backgroundColor: DA_COLORS.olive + '15', color: '#3d5a1d' }}>Câmpina</th>
                    <th style={{ padding: '12px 16px', textAlign: 'right', backgroundColor: DA_COLORS.wheat + '50' }}>Diferență</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    { m: 'Suprafață', c: `${curteaDeArges?.area} mp`, ca: `${campina?.area} mp`, d: '-53 mp', dc: DA_COLORS.text },
                    { m: 'Total final', c: formatCurrency(curteaDeArges?.totalAfterDiscount), ca: formatCurrency(campina?.totalAfterDiscount), d: '+€6,291', dc: DA_COLORS.terracotta },
                    { m: 'Preț/mp', c: `€${curteaDeArges?.pricePerSqm}`, ca: `€${campina?.pricePerSqm}`, d: '+€19.36/mp', dc: DA_COLORS.terracotta },
                    { m: 'Tarif DTAC', c: '€13/mp', ca: '€12/mp', d: '+€1/mp', dc: DA_COLORS.terracotta },
                    { m: 'Tarif PTH', c: '€16/mp', ca: '€15/mp', d: '+€1/mp', dc: DA_COLORS.terracotta },
                  ].map((row, idx) => (
                    <tr key={idx} style={{ borderBottom: `1px solid ${DA_COLORS.wheat}` }}>
                      <td style={{ padding: '12px 16px', fontWeight: 500 }}>{row.m}</td>
                      <td style={{ padding: '12px 16px', textAlign: 'right', backgroundColor: DA_COLORS.primary + '05', fontWeight: 600 }}>{row.c}</td>
                      <td style={{ padding: '12px 16px', textAlign: 'right', backgroundColor: DA_COLORS.olive + '08' }}>{row.ca}</td>
                      <td style={{ padding: '12px 16px', textAlign: 'right', color: row.dc, fontWeight: 600 }}>{row.d}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Conclusion */}
            <div style={{ background: `linear-gradient(135deg, ${DA_COLORS.text} 0%, #1a1a1a 100%)`, borderRadius: '12px', padding: '24px', color: DA_COLORS.white }}>
              <h3 style={{ fontSize: '18px', fontWeight: 600, marginBottom: '16px', color: DA_COLORS.amberGold }}>📋 Concluzie & Recomandare</h3>
              <p style={{ color: DA_COLORS.wheat, fontSize: '14px', lineHeight: 1.6 }}>
                <strong style={{ color: DA_COLORS.amberGold }}>Recomandare:</strong> Oferta este fundamentată datorită serviciilor suplimentare (desființare C2, SRE, NZEB, scenariu incendiu). 
                Recomand să soliciți aliniere tarife DTAC/PTH la standard (€12/€15) — ar reduce totalul cu ~€866. Alternativ, acceptă dacă Andrei justifică complexitatea proiectului.
              </p>
            </div>
          </div>
        )}

        {activeTab === 'services' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '32px' }}>
            {/* Service Matrix */}
            <div style={{ backgroundColor: DA_COLORS.white, borderRadius: '12px', border: `1px solid ${DA_COLORS.wheat}`, overflow: 'hidden' }}>
              <div style={{ padding: '16px 24px', borderBottom: `1px solid ${DA_COLORS.wheat}`, backgroundColor: DA_COLORS.wheat + '50' }}>
                <h2 style={{ fontSize: '18px', fontWeight: 600, color: DA_COLORS.primary, margin: 0 }}>Matrice Servicii Incluse</h2>
                <p style={{ fontSize: '13px', color: '#64748b', marginTop: '4px' }}>Comparație servicii între toate ofertele</p>
              </div>
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                  <thead>
                    <tr style={{ backgroundColor: DA_COLORS.primary, color: DA_COLORS.white, fontSize: '11px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                      <th style={{ padding: '12px 16px', textAlign: 'left', position: 'sticky', left: 0, backgroundColor: DA_COLORS.primary, minWidth: '160px' }}>Serviciu</th>
                      {offersWithMetrics.map(o => (
                        <th key={o.id} style={{ padding: '12px 8px', textAlign: 'center', backgroundColor: o.isHighlighted ? '#5a1510' : DA_COLORS.primary, minWidth: '90px' }}>
                          {o.name}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      { key: 'releveu', label: 'Releveu' },
                      { key: 'ridicareTopografica', label: 'Ridicare topografică' },
                      { key: 'expertizaTehnica', label: 'Expertiză tehnică' },
                      { key: 'expertizaDesfiintare', label: 'Expertiză desființare', special: true },
                      { key: 'studiuGeotehnic', label: 'Studiu geotehnic' },
                      { key: 'studiuFezabilitate', label: 'Studiu fezabilitate' },
                      { key: 'auditEnergetic', label: 'Audit energetic' },
                      { key: 'scenariuIncendiu', label: 'Scenariu incendiu' },
                      { key: 'proiectDrumuri', label: 'Proiect drumuri' },
                      { key: 'studiuIstoric', label: 'Studiu istoric' },
                      { key: 'verificare', label: 'Verificare' },
                      { key: 'sre', label: 'SRE', special: true },
                      { key: 'raportNzeb', label: 'Raport NZEB', special: true },
                      { key: 'dtac', label: 'Proiect DTAC' },
                      { key: 'pth', label: 'Proiect PTH' },
                      { key: 'asistentaTehnica', label: 'Asistență tehnică' },
                    ].map((service, idx) => (
                      <tr key={service.key} style={{
                        backgroundColor: service.special ? DA_COLORS.primary + '08' : idx % 2 === 0 ? DA_COLORS.white : DA_COLORS.wheat + '30',
                        borderBottom: `1px solid ${DA_COLORS.wheat}`
                      }}>
                        <td style={{
                          padding: '12px 16px', fontWeight: 500, color: DA_COLORS.text, position: 'sticky', left: 0,
                          backgroundColor: service.special ? DA_COLORS.primary + '08' : idx % 2 === 0 ? DA_COLORS.white : DA_COLORS.wheat + '30'
                        }}>
                          {service.label}
                          {service.special && <span style={{ marginLeft: '4px', color: DA_COLORS.primary }}>★</span>}
                        </td>
                        {offersWithMetrics.map(o => {
                          const value = o.services[service.key];
                          const hasService = typeof value === 'object' ? value.total > 0 : value > 0;
                          return (
                            <td key={o.id} style={{
                              padding: '12px 8px', textAlign: 'center',
                              backgroundColor: o.isHighlighted ? DA_COLORS.primary + '08' : 'transparent'
                            }}>
                              {hasService ? (
                                <span style={{
                                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                  width: '26px', height: '26px', borderRadius: '50%',
                                  backgroundColor: DA_COLORS.primary, color: DA_COLORS.white, fontSize: '14px', fontWeight: 700
                                }}>✓</span>
                              ) : (
                                <span style={{
                                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                  width: '26px', height: '26px', borderRadius: '50%',
                                  backgroundColor: DA_COLORS.wheat, color: '#999', fontSize: '14px'
                                }}>-</span>
                              )}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                    <tr style={{ backgroundColor: DA_COLORS.primary + '10', fontWeight: 600 }}>
                      <td style={{ padding: '12px 16px', position: 'sticky', left: 0, backgroundColor: DA_COLORS.primary + '10' }}>Randări (buc)</td>
                      {offersWithMetrics.map(o => (
                        <td key={o.id} style={{
                          padding: '12px 8px', textAlign: 'center',
                          backgroundColor: o.isHighlighted ? DA_COLORS.primary + '15' : DA_COLORS.primary + '10'
                        }}>
                          {o.services.randari.qty > 0 ? o.services.randari.qty : '-'}
                        </td>
                      ))}
                    </tr>
                  </tbody>
                </table>
              </div>
              <div style={{ padding: '12px 24px', backgroundColor: DA_COLORS.wheat + '30', borderTop: `1px solid ${DA_COLORS.wheat}` }}>
                <p style={{ fontSize: '12px', color: '#64748b', margin: 0 }}>
                  <span style={{ color: DA_COLORS.primary }}>★</span> Servicii speciale disponibile doar în anumite oferte — Curtea de Argeș include SRE, NZEB și Expertiză desființare C2
                </p>
              </div>
            </div>

            {/* Cost Breakdown Chart */}
            <div style={{ backgroundColor: DA_COLORS.white, borderRadius: '12px', border: `1px solid ${DA_COLORS.wheat}`, padding: '24px' }}>
              <h3 style={{ fontSize: '18px', fontWeight: 600, color: DA_COLORS.primary, marginBottom: '16px' }}>Structură Costuri per Ofertă</h3>
              <ResponsiveContainer width="100%" height={400}>
                <BarChart data={offersWithMetrics.map(o => ({
                  name: o.name,
                  'Studii & Avize': o.studiesTotal,
                  'Proiectare (DTAC+PTH)': o.designOnlyTotal,
                  'Randări': o.randariFee
                }))} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke={DA_COLORS.wheat} />
                  <XAxis type="number" tick={{ fill: '#64748b', fontSize: 12 }} tickFormatter={(v) => `€${(v/1000).toFixed(0)}k`} />
                  <YAxis dataKey="name" type="category" tick={{ fill: '#64748b', fontSize: 11 }} width={100} />
                  <Tooltip formatter={(value) => formatCurrency(value)} contentStyle={{ borderRadius: '8px', border: `1px solid ${DA_COLORS.wheat}` }} />
                  <Legend />
                  <Bar dataKey="Studii & Avize" stackId="a" fill={DA_COLORS.terracotta} />
                  <Bar dataKey="Proiectare (DTAC+PTH)" stackId="a" fill={DA_COLORS.primary} />
                  <Bar dataKey="Randări" stackId="a" fill={DA_COLORS.olive} />
                </BarChart>
              </ResponsiveContainer>
              <div style={{ marginTop: '16px', display: 'flex', justifyContent: 'center', gap: '24px', fontSize: '13px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <div style={{ width: '16px', height: '16px', backgroundColor: DA_COLORS.terracotta, borderRadius: '4px' }}></div>
                  <span style={{ color: '#64748b' }}>Studii & Avize</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <div style={{ width: '16px', height: '16px', backgroundColor: DA_COLORS.primary, borderRadius: '4px' }}></div>
                  <span style={{ color: '#64748b' }}>Proiectare (DTAC+PTH)</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <div style={{ width: '16px', height: '16px', backgroundColor: DA_COLORS.olive, borderRadius: '4px' }}></div>
                  <span style={{ color: '#64748b' }}>Randări</span>
                </div>
              </div>
            </div>
          </div>
        )}

        {activeTab === 'details' && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '24px' }}>
            {offersWithMetrics.map(offer => (
              <div key={offer.id} style={{
                backgroundColor: DA_COLORS.white, borderRadius: '12px',
                border: `2px solid ${offer.isHighlighted ? DA_COLORS.primary : DA_COLORS.wheat}`,
                overflow: 'hidden'
              }}>
                <div style={{
                  padding: '16px 20px',
                  backgroundColor: offer.isHighlighted ? DA_COLORS.primary + '10' : DA_COLORS.wheat + '50',
                  borderBottom: `1px solid ${DA_COLORS.wheat}`
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                    <h3 style={{ fontSize: '16px', fontWeight: 600, color: offer.isHighlighted ? DA_COLORS.primary : DA_COLORS.text, margin: 0 }}>
                      {offer.isHighlighted && '🎯 '}{offer.name}
                    </h3>
                    <StatusBadge status={offer.status} />
                  </div>
                  <p style={{ fontSize: '13px', color: '#64748b', marginTop: '4px' }}>{offer.address}</p>
                </div>
                <div style={{ padding: '20px' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px', marginBottom: '16px' }}>
                    <div><p style={{ fontSize: '11px', color: '#64748b', margin: 0 }}>Suprafață</p><p style={{ fontWeight: 600, margin: 0 }}>{offer.area ? `${offer.area} mp` : 'N/A'}</p></div>
                    <div><p style={{ fontSize: '11px', color: '#64748b', margin: 0 }}>Preț/mp</p><p style={{ fontWeight: 600, margin: 0 }}>{offer.pricePerSqm ? `€${offer.pricePerSqm}` : 'N/A'}</p></div>
                  </div>
                  <div style={{ paddingTop: '16px', borderTop: `1px solid ${DA_COLORS.wheat}` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', marginBottom: '4px' }}>
                      <span style={{ color: '#64748b' }}>Total brut</span><span>{formatCurrency(offer.totalBeforeDiscount)}</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', color: DA_COLORS.olive }}>
                      <span>Discount</span><span>-{formatCurrency(offer.discount)}</span>
                    </div>
                    <div style={{
                      display: 'flex', justifyContent: 'space-between', fontSize: '18px', fontWeight: 700, marginTop: '12px', paddingTop: '12px',
                      borderTop: `2px solid ${offer.isHighlighted ? DA_COLORS.primary : DA_COLORS.wheat}`,
                      color: offer.isHighlighted ? DA_COLORS.primary : DA_COLORS.text
                    }}>
                      <span>Total final</span><span>{formatCurrency(offer.totalAfterDiscount)}</span>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </main>

    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
</script>
</body>
</html>
